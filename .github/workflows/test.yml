name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        # `[torch]` is required because the test suite now includes the
        # add-concept-anchored-finetune training-side tests, whose
        # modules (saeforge/training/heads.py, the in-loop hook on
        # lm_head, etc.) import torch at module load. Without it, the
        # whole tests/training/ collection fails with a
        # ModuleNotFoundError on `import torch`. Existing torch-using
        # tests already gate behind `pytest.importorskip("torch")` and
        # would still skip cleanly, but the new ones legitimately need
        # torch to exercise the supervised-concept loss path.
        run: pip install -e ".[dev,torch]"

      - name: Lint with ruff
        run: ruff check saeforge tests examples

      - name: Test with pytest
        run: pytest --tb=short -v
