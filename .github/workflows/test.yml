name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        # `[torch]` is required because the add-concept-anchored-finetune
        # training-side tests import torch at module load — without it
        # the whole tests/training/ collection fails with
        # ModuleNotFoundError. `[orca]` is required because three
        # FSM-path tests (test_examples_smoke,
        # test_pipeline_with_custom_target, test_pipeline_with_gt_alignment)
        # exercise saeforge.orchestrator.run_machine which lazy-imports
        # orca_runtime_python. Before this change the CI used `[dev]`
        # alone, so torch- and orca-gated tests silently skipped.
        run: pip install -e ".[dev,torch,orca]"

      - name: Lint with ruff
        run: ruff check saeforge tests examples

      - name: Test with pytest
        run: pytest --tb=short -v
